name: Smoke (post-deploy)

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Target base URL (staging/prod)
        required: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke checks
        run: BASE_URL="${{ inputs.base_url }}" bash scripts/smoke.sh
