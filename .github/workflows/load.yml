name: Load test (manual)

# Load tests need a running target — run on demand against staging, never
# automatically against production.
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Target base URL (e.g. https://staging.theory.example)
        required: true
      email:
        description: Seed account email
        required: true
      password:
        description: Seed account password
        required: true

jobs:
  k6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run k6 hot-path profile
        run: |
          docker run --rm -i \
            -e BASE_URL="${{ inputs.base_url }}" \
            -e EMAIL="${{ inputs.email }}" \
            -e PASS="${{ inputs.password }}" \
            grafana/k6 run - < loadtest/k6-hot.js
